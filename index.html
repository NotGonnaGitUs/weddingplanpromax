<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marrymap — Your AI Wedding Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<style>
  :root{
    --ink:#1C1B2E;
    --ink-soft:#2A2840;
    --paper:#FAF7F2;
    --paper-dim:#EFE9DE;
    --gold:#C9A267;
    --clay:#B5624B;
    --accent:#F2A93B;
    --glow:#E0447C;
    --pbg:#2a1f3d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif;overflow:hidden;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:500;}
  .italic-display{font-family:'Fraunces',serif;font-style:italic;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;color:inherit;}
  a{color:inherit;}
  input,select{font-family:'Inter',sans-serif;}

  .screen{position:fixed;inset:0;}
  .hidden{display:none !important;}

  .back-btn{
    position:absolute;top:28px;left:28px;z-index:50;
    display:flex;align-items:center;gap:8px;
    padding:10px 16px;border-radius:999px;
    background:rgba(250,247,242,0.08);
    border:1px solid rgba(250,247,242,0.16);
    color:var(--paper);font-size:13px;letter-spacing:.03em;
    transition:background .2s,border-color .2s,transform .2s;
  }
  .back-btn:hover{background:rgba(250,247,242,0.16);border-color:rgba(250,247,242,0.3);transform:translateX(-2px);}
  .esc-hint{
    position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(250,247,242,.45);z-index:50;
  }
  .kbd{
    display:inline-block;padding:1px 6px;border-radius:4px;border:1px solid rgba(250,247,242,.3);
    font-size:10px;margin-right:4px;
  }

  /* ================= LANDING ================= */
  #landing{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:5vh 5vw;overflow-y:auto;
    background:
      radial-gradient(ellipse 800px 420px at 20% 0%, rgba(201,162,103,.14), transparent 55%),
      radial-gradient(ellipse 700px 480px at 90% 100%, rgba(181,98,75,.10), transparent 55%),
      linear-gradient(165deg, #1C1B2E 0%, #242038 48%, #1a2430 100%);
  }
  .landing-shell{width:min(560px,100%);text-align:center;}
  .landing-mark{
    font-family:'Fraunces',serif;font-style:italic;font-size:clamp(42px,7vw,64px);
    color:var(--paper);margin:0 0 10px;line-height:1;letter-spacing:-.02em;
  }
  .landing-sub{
    font-size:15px;color:rgba(250,247,242,.62);line-height:1.55;margin:0 0 28px;font-weight:300;
  }

  .wedding-form{
    text-align:left;background:var(--paper);color:var(--ink);
    border-radius:20px;padding:28px 26px 24px;
    box-shadow:0 30px 60px -28px rgba(0,0,0,.55);
    border:1px solid rgba(250,247,242,.08);
  }
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-row.full{grid-template-columns:1fr;}
  .field label{
    display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:rgba(28,27,46,.48);font-weight:600;margin-bottom:7px;
  }
  .field input,.field select{
    width:100%;padding:12px 13px;border-radius:10px;
    border:1px solid rgba(28,27,46,.12);background:#fff;
    color:var(--ink);font-size:14.5px;outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input:focus,.field select:focus{
    border-color:color-mix(in srgb, var(--accent) 70%, #1C1B2E);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .field input::placeholder{color:rgba(28,27,46,.35);}
  .form-actions{margin-top:6px;}
  .form-submit{
    width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--ink);color:var(--paper);font-weight:600;font-size:14.5px;
    padding:15px 22px;border-radius:999px;margin-top:8px;
    transition:transform .18s ease, background .18s ease;
  }
  .form-submit:hover{transform:translateY(-2px);background:#2a2840;}

  .quick-fills{margin-top:22px;text-align:center;}
  .qf-label{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:rgba(250,247,242,.4);margin-bottom:10px;
  }
  .qf-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .qf-chip{
    padding:7px 13px;border-radius:999px;font-size:12.5px;
    border:1px solid rgba(250,247,242,.18);color:rgba(250,247,242,.72);
    background:rgba(250,247,242,.05);transition:border-color .15s, color .15s, background .15s;
  }
  .qf-chip:hover{border-color:rgba(250,247,242,.4);color:var(--paper);background:rgba(250,247,242,.1);}

  @media (max-width:560px){
    .form-row{grid-template-columns:1fr;}
    .wedding-form{padding:22px 18px;}
  }

  /* ================= AGENT ================= */
  #agent{display:flex;align-items:center;justify-content:center;background:var(--ink);}
  .agent-glow{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 700px 500px at 50% 15%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 65%);
  }
  .terminal{
    position:relative;z-index:2;width:min(660px,90vw);height:min(66vh,620px);
    background:var(--paper);color:var(--ink);border-radius:18px;
    box-shadow:0 40px 80px -30px rgba(0,0,0,.65);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .terminal-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 22px;border-bottom:1px solid rgba(28,27,46,.08);
    background:var(--paper-dim);
  }
  .terminal-head .th-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(28,27,46,.5);font-weight:600;}
  .terminal-head .th-couple{font-family:'Fraunces',serif;font-style:italic;font-size:16px;color:var(--ink);}
  .terminal-dots span{display:inline-block;width:9px;height:9px;border-radius:50%;margin-left:6px;background:rgba(28,27,46,.15);}
  .terminal-body{
    flex:1;overflow-y:auto;padding:22px 26px;
    font-family:ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size:13.5px;line-height:1.9;
  }
  .terminal-body .line{display:flex;gap:10px;opacity:0;animation:lineIn .35s ease forwards;}
  .terminal-body .line.clickable{cursor:pointer;border-radius:6px;margin:0 -8px;padding:0 8px;}
  .terminal-body .line.clickable:hover{background:rgba(28,27,46,.05);}
  @keyframes lineIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .terminal-body .icon{width:16px;flex-shrink:0;text-align:center;}
  .line.ink .icon, .line.ink .text{color:rgba(28,27,46,.55);}
  .line.accent .icon{color:var(--accent);font-weight:700;}
  .line.accent .text{color:var(--ink);}
  .line.clay .icon{color:var(--clay);}
  .line.clay .text{color:var(--clay);}
  .cursor{
    display:inline-block;width:8px;height:15px;background:var(--ink);margin-left:2px;
    animation:blink 1s steps(1) infinite;vertical-align:-2px;
  }
  @keyframes blink{0%,50%{opacity:1;}50.01%,100%{opacity:0;}}

  /* ================= PLAN ================= */
  #plan{display:flex;flex-direction:column;background:var(--ink);}
  .plan-header{
    padding:92px 6vw 0;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;
  }
  .plan-header .ph-title{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(26px,3.2vw,36px);color:var(--paper);margin:0;}
  .plan-header .ph-sub{font-size:12.5px;color:rgba(250,247,242,.5);letter-spacing:.04em;margin-top:6px;}
  .rerun-btn{
    font-size:12px;letter-spacing:.05em;color:rgba(250,247,242,.55);
    border:1px solid rgba(250,247,242,.18);border-radius:999px;padding:8px 14px;
    transition:color .2s,border-color .2s;
  }
  .rerun-btn:hover{color:var(--paper);border-color:rgba(250,247,242,.4);}

  .tabs-nav{
    display:flex;gap:6px;padding:26px 6vw 0;border-bottom:1px solid rgba(250,247,242,.1);
  }
  .tab-btn{
    padding:12px 18px;font-size:13px;letter-spacing:.03em;color:rgba(250,247,242,.48);
    border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
  }
  .tab-btn.active{color:var(--paper);border-bottom-color:var(--accent);}
  .tab-btn:hover{color:var(--paper);}
  .tab-btn.wedding-tab{color:var(--accent);font-weight:600;}

  .tabs-body{flex:1;overflow-y:auto;padding:0 6vw 6vh;display:flex;justify-content:center;}
  .tab-panel{display:none;width:100%;max-width:760px;padding-top:38px;}
  .tab-panel.active{display:block;}

  .invite-card{
    background:var(--paper);color:var(--ink);border-radius:20px;
    padding:56px 48px;text-align:center;position:relative;
    border:1px solid rgba(0,0,0,.05);
    box-shadow:0 30px 60px -30px rgba(0,0,0,.5);
  }
  .invite-card::before{
    content:"";position:absolute;inset:14px;border:1px solid var(--gold);border-radius:12px;pointer-events:none;
  }
  .invite-loc{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;font-weight:600;}
  .invite-names{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:clamp(34px,4.6vw,48px);margin:0 0 20px;line-height:1.1;}
  .invite-date{font-size:13px;color:rgba(28,27,46,.55);margin-bottom:26px;}
  .invite-copy{font-size:15.5px;line-height:1.8;color:rgba(28,27,46,.78);max-width:480px;margin:0 auto 34px;font-weight:300;}
  .cta-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--accent);color:var(--ink);font-weight:600;font-size:14px;
    padding:14px 26px;border-radius:999px;transition:transform .18s ease, box-shadow .18s ease;
    box-shadow:0 14px 26px -12px color-mix(in srgb, var(--accent) 70%, transparent);
  }
  .cta-btn:hover{transform:translateY(-2px);}

  .vendor-row{
    display:grid;grid-template-columns:100px 1fr auto;gap:18px;align-items:center;
    padding:18px 4px;border-bottom:1px solid rgba(250,247,242,.09);
    cursor:pointer;border-radius:10px;transition:background .15s;
  }
  .vendor-row:hover{background:rgba(250,247,242,.04);}
  .vendor-row:first-child{padding-top:4px;}
  .v-cat{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(250,247,242,.42);font-weight:600;}
  .v-name{font-family:'Fraunces',serif;font-size:17px;color:var(--paper);margin-bottom:4px;}
  .v-note{font-size:12.5px;color:rgba(250,247,242,.48);font-style:italic;}
  .v-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .v-price{font-variant-numeric:tabular-nums;font-size:16px;color:var(--gold);font-weight:600;}
  .v-status{font-size:11px;color:var(--accent);letter-spacing:.02em;display:flex;align-items:center;gap:4px;}
  .v-flag{
    font-size:10.5px;color:var(--clay);background:rgba(181,98,75,.14);border:1px solid rgba(181,98,75,.35);
    padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;margin-bottom:2px;
  }
  .vendor-row.flagged .v-name{color:#EFCFC4;}
  .v-hint{font-size:11px;color:rgba(250,247,242,.35);margin-top:2px;}

  .budget-row{padding:16px 2px;border-bottom:1px solid rgba(250,247,242,.08);}
  .budget-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
  .b-label{font-size:13.5px;color:rgba(250,247,242,.7);}
  .b-label span{color:rgba(250,247,242,.42);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-right:8px;}
  .b-price{font-variant-numeric:tabular-nums;font-size:13.5px;color:var(--gold);font-weight:600;}
  .bar-track{height:9px;border-radius:999px;background:rgba(250,247,242,.08);overflow:hidden;}
  .bar-fill{height:100%;border-radius:999px;width:0%;background:linear-gradient(90deg,var(--accent),var(--glow));
    transition:width 1.1s cubic-bezier(.16,.84,.44,1);}
  .budget-row.flagged .bar-fill{background:linear-gradient(90deg,var(--clay),#8f4a3a);}
  .budget-row.flagged .b-label{color:#EFCFC4;}
  .budget-flag-note{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:12px;color:var(--clay);}
  .spark{display:inline-flex;align-items:end;gap:1.5px;height:12px;}
  .spark i{display:block;width:3px;background:var(--clay);border-radius:1px;opacity:.85;}

  .budget-total{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:26px;padding-top:22px;border-top:1px solid rgba(250,247,242,.14);
  }
  .budget-total .bt-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,247,242,.5);}
  .budget-total .bt-value{font-family:'Fraunces',serif;font-size:30px;color:var(--paper);font-variant-numeric:tabular-nums;}
  .budget-total .bt-value small{font-size:15px;color:rgba(250,247,242,.4);font-family:'Inter',sans-serif;}

  /* Vendor detail drawer */
  .vendor-backdrop{
    position:fixed;inset:0;background:rgba(12,11,20,.55);z-index:80;
    opacity:0;pointer-events:none;transition:opacity .22s ease;
  }
  .vendor-backdrop.open{opacity:1;pointer-events:auto;}
  .vendor-drawer{
    position:fixed;top:0;right:0;bottom:0;width:min(420px,92vw);z-index:90;
    background:var(--paper);color:var(--ink);
    transform:translateX(104%);transition:transform .28s cubic-bezier(.22,.8,.28,1);
    box-shadow:-24px 0 60px -30px rgba(0,0,0,.55);
    display:flex;flex-direction:column;padding:28px 28px 32px;
  }
  .vendor-drawer.open{transform:translateX(0);}
  .vd-close{
    align-self:flex-end;width:36px;height:36px;border-radius:50%;
    border:1px solid rgba(28,27,46,.12);font-size:18px;color:rgba(28,27,46,.55);
    display:flex;align-items:center;justify-content:center;
  }
  .vd-close:hover{background:rgba(28,27,46,.05);color:var(--ink);}
  .vd-cat{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:12px 0 8px;}
  .vd-name{font-family:'Fraunces',serif;font-style:italic;font-size:30px;margin:0 0 8px;line-height:1.15;}
  .vd-price{font-size:22px;color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums;margin-bottom:18px;}
  .vd-blurb{font-size:14.5px;line-height:1.65;color:rgba(28,27,46,.72);margin:0 0 20px;font-weight:300;}
  .vd-section{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(28,27,46,.42);font-weight:600;margin:0 0 10px;}
  .vd-includes{margin:0 0 22px;padding:0 0 0 18px;color:rgba(28,27,46,.78);font-size:14px;line-height:1.7;}
  .vd-style{
    background:var(--paper-dim);border-radius:12px;padding:14px 16px;
    font-size:13.5px;line-height:1.55;color:rgba(28,27,46,.7);font-style:italic;
  }
  .vd-booked{margin-top:auto;padding-top:20px;font-size:12.5px;color:var(--accent);font-weight:600;}

  /* ================= SCENE ================= */
  #scene{background:#000;}
  #scene-canvas{position:absolute;inset:0;}
  .scene-overlay{
    position:absolute;left:0;right:0;bottom:9vh;text-align:center;pointer-events:none;z-index:5;
    opacity:0;transition:opacity 1.4s ease 1.6s;
  }
  .scene-overlay.show{opacity:1;}
  .scene-overlay .so-names{
    font-family:'Fraunces',serif;font-style:italic;font-size:clamp(30px,5vw,52px);color:#fff;
    text-shadow:0 4px 26px rgba(0,0,0,.45);margin:0;
  }
  .scene-overlay .so-loc{
    margin-top:10px;font-size:12.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.75);
  }
  .scene-tier{
    margin-top:8px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(250,247,242,.15);border-radius:4px;}
</style>
</head>
<body>

<!-- ================= LANDING ================= -->
<div id="landing" class="screen">
  <div class="landing-shell">
    <h1 class="landing-mark">Marrymap</h1>
    <p class="landing-sub">Tell us the wedding. Watch the agent shop the marketplace, book vendors, and build the day — live.</p>

    <form class="wedding-form" id="wedding-form" novalidate>
      <div class="form-row">
        <div class="field">
          <label for="f-p1">Partner 1</label>
          <input id="f-p1" name="partner1" type="text" placeholder="Priya" required autocomplete="given-name">
        </div>
        <div class="field">
          <label for="f-p2">Partner 2</label>
          <input id="f-p2" name="partner2" type="text" placeholder="Arjun" required autocomplete="given-name">
        </div>
      </div>
      <div class="form-row full">
        <div class="field">
          <label for="f-loc">Destination</label>
          <input id="f-loc" name="location" type="text" placeholder="Goa, India" required>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="f-date">Wedding date</label>
          <input id="f-date" name="date" type="text" placeholder="February 14, 2027" required>
        </div>
        <div class="field">
          <label for="f-guests">Guests</label>
          <input id="f-guests" name="guests" type="number" min="10" max="500" placeholder="80" required>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="f-budget">Budget (USD)</label>
          <input id="f-budget" name="budget" type="number" min="5000" max="500000" step="1000" placeholder="42000" required>
        </div>
        <div class="field">
          <label for="f-vibe">Vibe</label>
          <select id="f-vibe" name="vibe">
            <option value="beach">Beach</option>
            <option value="vineyard">Vineyard</option>
            <option value="island">Island</option>
            <option value="jungle">Jungle</option>
            <option value="coastal">Coastal</option>
            <option value="wine">Wine country</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="form-submit">Let the agent shop →</button>
      </div>
    </form>

    <div class="quick-fills">
      <div class="qf-label">Try a destination</div>
      <div class="qf-chips" id="qf-chips"></div>
    </div>
  </div>
</div>

<!-- ================= AGENT ================= -->
<div id="agent" class="screen hidden">
  <button class="back-btn" data-back>← Back</button>
  <div class="agent-glow"></div>
  <div class="terminal">
    <div class="terminal-head">
      <div>
        <div class="th-label">Marrymap Agent</div>
        <div class="th-couple" id="agent-couple-name"></div>
      </div>
      <div class="terminal-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="terminal-body" id="terminal-body"></div>
  </div>
  <div class="esc-hint"><span class="kbd">esc</span>cancel</div>
</div>

<!-- ================= PLAN ================= -->
<div id="plan" class="screen hidden">
  <button class="back-btn" data-back>← Back</button>
  <div class="plan-header">
    <div>
      <h2 class="ph-title" id="plan-title"></h2>
      <div class="ph-sub" id="plan-sub"></div>
    </div>
    <button class="rerun-btn" id="rerun-btn">↻ Re-run agent</button>
  </div>
  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="invite">Invite</button>
    <button class="tab-btn" data-tab="vendors">Vendors</button>
    <button class="tab-btn" data-tab="budget">Budget</button>
    <button class="tab-btn wedding-tab" data-tab="wedding">Your Wedding</button>
  </div>
  <div class="tabs-body">
    <div class="tab-panel active" id="tab-invite">
      <div class="invite-card">
        <div class="invite-loc" id="inv-loc"></div>
        <h3 class="invite-names" id="inv-names"></h3>
        <div class="invite-date" id="inv-date"></div>
        <p class="invite-copy" id="inv-copy"></p>
        <button class="cta-btn" data-go-scene>Go to your wedding →</button>
      </div>
    </div>
    <div class="tab-panel" id="tab-vendors">
      <div id="vendor-list"></div>
    </div>
    <div class="tab-panel" id="tab-budget">
      <div id="budget-list"></div>
      <div class="budget-total">
        <div class="bt-label">Total allocated</div>

const $ = sel => document.querySelector(sel);

const fmtMoney = n => '$' + Math.round(n).toLocaleString('en-US');
const shortK = n => Math.round(n/1000) + 'k';

function hexToRgb(hex){
  const h = hex.replace('#','');
  return { r: parseInt(h.substring(0,2),16), g: parseInt(h.substring(2,4),16), b: parseInt(h.substring(4,6),16) };
}
function rgbToHexNum(r,g,b){ return (Math.round(r)<<16) + (Math.round(g)<<8) + Math.round(b); }
function mixColor(hexA, hexB, t){
  const a = hexToRgb(hexA), b = hexToRgb(hexB);
  return rgbToHexNum(a.r+(b.r-a.r)*t, a.g+(b.g-a.g)*t, a.b+(b.b-a.b)*t);
}
function darkenHexToNum(hex, factor){
  const c = hexToRgb(hex);
  return rgbToHexNum(c.r*factor, c.g*factor, c.b*factor);
}
function numToHex(n){
  return '#' + n.toString(16).padStart(6,'0');
}

function getBudgetTier(budgetTotal, guests){
  const perGuest = budgetTotal / Math.max(guests, 1);
  if(budgetTotal >= 55000 || perGuest >= 750) return 'high';
  if(budgetTotal <= 28000 || perGuest < 420) return 'low';
  return 'mid';
}

function findSeed(location, vibe){
  const loc = (location || '').toLowerCase();
  for(const row of LOC_KEYWORDS){
    if(row.keys.some(k => loc.includes(k))) return COUPLES.find(c => c.id === row.id);
  }
  const vibeId = VIBE_TO_SEED[vibe] || 'priya-arjun';
  return COUPLES.find(c => c.id === vibeId) || COUPLES[0];
}

function scaleVendors(vendors, guests, budgetTotal){
  const sum = vendors.reduce((s,v) => s + v.price, 0) || 1;
  const scaled = vendors.map(v => {
    let price = Math.round((v.price / sum) * budgetTotal / 50) * 50;
    price = Math.max(500, price);
    let note = (v.note || '').replace(/\d+\s*guests?/i, `${guests} guests`);
    if(!/\d+\s*guests?/i.test(note) && v.category === 'Travel'){
      note = `${guests} guests · ${note}`;
    }
    return { ...v, price, note };
  });
  let diff = budgetTotal - scaled.reduce((s,v) => s + v.price, 0);
  scaled[1].price = Math.max(500, scaled[1].price + diff);
  return scaled;
}

function buildWeddingFromForm(raw){
  const p1 = (raw.partner1 || 'Partner One').trim();
  const p2 = (raw.partner2 || 'Partner Two').trim();
  const names = `${p1} & ${p2}`;
  const location = (raw.location || 'Somewhere Beautiful').trim();
  const date = (raw.date || 'Soon').trim();
  const guests = Math.max(10, parseInt(raw.guests, 10) || 80);
  const budgetTotal = Math.max(5000, parseInt(raw.budget, 10) || 40000);
  const vibe = raw.vibe || 'beach';
  const seed = findSeed(location, vibe);
  const vendors = scaleVendors(seed.vendors, guests, budgetTotal);
  const inviteCopy = seed.inviteCopy
    .replace(new RegExp(seed.names.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g'), names)
    .replace(new RegExp(seed.location.split(',')[0], 'gi'), location.split(',')[0]);

  return {
    id: 'custom-' + Date.now(),
    names, location, date, guests, budgetTotal, vibe,
    palette: { ...seed.palette },
    inviteCopy,
    vendors,
    seedId: seed.id,
    tier: getBudgetTier(budgetTotal, guests)
  };
}

function setPalette(couple){
  const root = document.body.style;

  root.setProperty('--glow', couple.palette.glow);
  root.setProperty('--pbg', couple.palette.bg);

function navigate(to, couple){
  if(vendorDrawerOpen) closeVendorDetail();
  if(currentScreen === 'agent' && to !== 'agent') stopAgent();
  if(currentScreen === 'scene' && to !== 'scene') stopScene();

  $$('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(to).classList.remove('hidden');
  currentScreen = to;
  if(couple) currentCouple = couple;

  if(to === 'agent'){ setPalette(currentCouple); startAgent(currentCouple); }
  if(to === 'plan'){ setPalette(currentCouple); renderPlan(currentCouple); }
  if(to === 'scene'){ setPalette(currentCouple); startScene(currentCouple); }
}

function goBack(){
  if(vendorDrawerOpen){ closeVendorDetail(); return; }
  const target = BACK_MAP[currentScreen];
  if(target) navigate(target, currentCouple);
}

document.addEventListener('keydown', e => {

   ========================================================================= */
let agentTimer = null;

function buildAgentLines(couple){
  const lines = [];
  lines.push({icon:'✦', cls:'ink', text:`Searching marketplace: ${couple.location.split(',')[0]}, ${couple.guests} guests, $${shortK(couple.budgetTotal)}…`});
  couple.vendors.forEach((v, i) => {
    if(v.flag){
      lines.push({icon:'⚑', cls:'clay', text:`${v.category} — quoted high · negotiating…`});
      lines.push({icon:'✓', cls:'accent', text:`${v.category} — locked at ${fmtMoney(v.price)} (${v.name})`, vendorIndex:i});
    } else {
      lines.push({icon:'✓', cls:'accent', text:`${v.category} — ${v.name} · ${fmtMoney(v.price)}`, vendorIndex:i});
    }
  });
  const total = couple.vendors.reduce((s,v) => s + v.price, 0);
  lines.push({icon:'✦', cls:'ink', text:`Plan ready — ${fmtMoney(total)} of ${fmtMoney(couple.budgetTotal)} allocated · ${couple.tier} tier`});
  return lines;
}

function startAgent(couple){
  $('#agent-couple-name').textContent = couple.names;
  const body = $('#terminal-body');
  body.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  body.appendChild(cursor);

  const lines = buildAgentLines(couple);
  let idx = 0;

  function step(){
    if(idx >= lines.length){
      agentTimer = setTimeout(() => navigate('plan', couple), 900);
      return;
    }
    const line = lines[idx++];
    const div = document.createElement('div');
    div.className = 'line ' + line.cls + (line.vendorIndex != null ? ' clickable' : '');
    div.innerHTML = `<span class="icon">${line.icon}</span><span class="text">${line.text}</span>`;
    if(line.vendorIndex != null){
      div.title = 'View vendor details';
      div.addEventListener('click', () => openVendorDetail(couple.vendors[line.vendorIndex], couple));
    }
    body.insertBefore(div, cursor);
    body.scrollTop = body.scrollHeight;
    agentTimer = setTimeout(step, 500 + Math.random()*200);
  }
  agentTimer = setTimeout(step, 400);
}

function stopAgent(){
  clearTimeout(agentTimer);
  agentTimer = null;
}

        <div class="b-price">${fmtMoney(v.price)}</div>
      </div>
      <div class="bar-track"><div class="bar-fill" data-target="${pct}%"></div></div>
      ${v.flag ? `
        <div class="budget-flag-note">
          <span class="spark">${sparkBars()}</span>
          <span>⚑ ${v.flag} — agent negotiating a lower rate</span>
        </div>` : ''}
    `;
    budgetList.appendChild(row);
  });

}

function activateTab(name){
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  $$('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  if(name === 'budget') animateBudget();
}

function animateBudget(){
  const bars = $$('#budget-list .bar-fill');
  bars.forEach(b => b.style.width = '0%');
  const totalEl = $('#budget-total-value');
  totalEl.textContent = '$0';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bars.forEach(b => b.style.width = b.dataset.target);
    animateCountUp(totalEl, currentCouple.budgetTotal);
  }));
}

function animateCountUp(el, target, duration=1200){
  const start = performance.now();
  function step(now){
    const t = Math.min(1, (now - start) / duration);
    el.textContent = fmtMoney(t * target);
    if(t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.dataset.tab === 'wedding'){
      navigate('scene', currentCouple);
    } else {
      activateTab(btn.dataset.tab);
    }
  });
});
$$('[data-go-scene]').forEach(btn => btn.addEventListener('click', () => navigate('scene', currentCouple)));
$('#rerun-btn').addEventListener('click', () => navigate('agent', currentCouple));

/* =========================================================================
   THREE.JS WEDDING SCENE
   ========================================================================= */
let renderer, scene, camera;
let sceneActive = false;
let flyStart = 0;
let orbitAngle = 0, orbitRadius = 0;
const CAM_START = { x:0, y:8, z:17 };
const CAM_END   = { x:0, y:2.3, z:6 };
const TARGET    = { x:0, y:1.4, z:-2 };
const FLY_MS = 2600;
let confettiPoints = null;
let petalPoints = null;
let seaMesh = null;
let sceneBuildId = 0;

const SKY_URL = 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80';

function initThree(){
  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  $('#scene-canvas').appendChild(renderer.domElement);
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    if(camera){
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
  });
}

function makeCanvasTexture(draw, w=512, h=512){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const tex = new THREE.CanvasTexture(c);
  if(THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

function paintSkyFallback(ctx, w, h, palette, tier){
  const g = ctx.createLinearGradient(0, 0, 0, h);
  const top = tier === 'high' ? mixColor(palette.bg, '#ffb070', 0.35) : mixColor(palette.bg, '#000000', 0.2);
  const mid = mixColor(palette.glow, palette.bg, 0.45);
  const sea = mixColor('#1a3a4a', palette.accent, 0.15);
  g.addColorStop(0, numToHex(top));
  g.addColorStop(0.45, numToHex(mid));
  g.addColorStop(0.62, numToHex(mixColor(palette.accent, '#ffd0a0', 0.4)));
  g.addColorStop(0.68, numToHex(sea));
  g.addColorStop(1, numToHex(mixColor(sea, '#0a1520', 0.5)));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  // soft clouds
  ctx.globalAlpha = tier === 'high' ? 0.18 : 0.1;
  ctx.fillStyle = '#fff8f0';
  for(let i=0;i<8;i++){
    const x = (i*97 % w), y = 40 + (i*53 % 120), r = 40 + (i%3)*30;
    ctx.beginPath(); ctx.ellipse(x, y, r, r*0.45, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function paintSandTexture(ctx, w, h, palette){
  const base = mixColor('#DCC79A', palette.accent, 0.1);
  ctx.fillStyle = numToHex(base);
  ctx.fillRect(0, 0, w, h);
  for(let i=0;i<5000;i++){
    const shade = 180 + Math.random()*60;
    ctx.fillStyle = `rgba(${shade},${shade-20},${shade-50},${0.08+Math.random()*0.12})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 1 + Math.random()*2, 1 + Math.random()*2);
  }
}

function disposeMaterial(mt){
  ['map','emissiveMap','normalMap','roughnessMap','metalnessMap','alphaMap'].forEach(k => {
    if(mt[k]) mt[k].dispose();
  });
  mt.dispose();
}

function buildWeddingScene(couple){
  const buildId = ++sceneBuildId;
  const tier = couple.tier || getBudgetTier(couple.budgetTotal, couple.guests);
  couple.tier = tier;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 300);

  const bgDark = tier === 'high' ? 0.55 : tier === 'low' ? 0.85 : 0.72;
  const bgNum = darkenHexToNum(couple.palette.bg, bgDark);
  scene.background = new THREE.Color(bgNum);
  scene.fog = new THREE.Fog(bgNum, tier === 'high' ? 32 : 40, tier === 'high' ? 120 : 100);

  // lights — richer at high tier
  const dir = new THREE.DirectionalLight(0xffdcab, tier === 'high' ? 1.55 : tier === 'low' ? 1.0 : 1.3);
  dir.position.set(6, 12, 6);
  scene.add(dir);
  const amb = new THREE.AmbientLight(0x555070, tier === 'high' ? 0.9 : 0.7);
  scene.add(amb);
  const glowLight = new THREE.PointLight(couple.palette.glow, tier === 'high' ? 4.2 : 2.6, 14, 2);
  glowLight.position.set(0, 3.4, -2);
  scene.add(glowLight);
  if(tier === 'high'){
    const goldFill = new THREE.PointLight(0xffd699, 1.8, 18, 2);
    goldFill.position.set(-3, 4, 2);
    scene.add(goldFill);
  }

  // ground sand texture
  const sandTex = makeCanvasTexture((ctx,w,h) => paintSandTexture(ctx,w,h, couple.palette), 512, 512);
  sandTex.wrapS = sandTex.wrapT = THREE.RepeatWrapping;
  sandTex.repeat.set(tier === 'high' ? 10 : 7, tier === 'high' ? 10 : 7);
  const sandColor = mixColor('#DCC79A', couple.palette.accent, 0.08);
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(42, 64),
    new THREE.MeshStandardMaterial({
      color: sandColor, map: sandTex, roughness: tier === 'high' ? 0.85 : 1, metalness: tier === 'high' ? 0.08 : 0
    })
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // sea
  const seaColor = mixColor('#1F3F52', couple.palette.bg, 0.3);
  const seaGeo = new THREE.PlaneGeometry(300, 140, 40, 12);
  const seaMat = new THREE.MeshStandardMaterial({
    color: seaColor, roughness:0.55, metalness: tier === 'high' ? 0.25 : 0.1
  });
  seaMesh = new THREE.Mesh(seaGeo, seaMat);
  seaMesh.rotation.x = -Math.PI/2;
  seaMesh.position.set(0, -0.04, -70);
  seaMesh.userData.basePositions = seaGeo.attributes.position.array.slice();
  scene.add(seaMesh);

  // sky / backdrop cylinder (photo + canvas fallback)
  const skyFallback = makeCanvasTexture((ctx,w,h) => paintSkyFallback(ctx,w,h, couple.palette, tier), 1024, 512);
  const skyTint = tier === 'high'
    ? mixColor('#ffffff', couple.palette.accent, 0.12)
    : mixColor('#c8c0b8', couple.palette.bg, 0.25);
  const skyMat = new THREE.MeshBasicMaterial({
    map: skyFallback,
    color: skyTint,
    side: THREE.BackSide,
    fog: true
  });
  const sky = new THREE.Mesh(new THREE.CylinderGeometry(58, 58, 48, 48, 1, true), skyMat);
  sky.position.y = 16;
  scene.add(sky);

  // try loading photographic sky
  const loader = new THREE.TextureLoader();
  loader.setCrossOrigin('anonymous');
  loader.load(SKY_URL, tex => {
    if(buildId !== sceneBuildId){ tex.dispose(); return; }
    if(THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
    const old = skyMat.map;
    skyMat.map = tex;
    skyMat.needsUpdate = true;
    if(old) old.dispose();
  }, undefined, () => { /* keep canvas fallback */ });

  // arch — scale + ornament by tier
  const archR = tier === 'high' ? 2.55 : tier === 'low' ? 2.0 : 2.3;
  const archGroup = new THREE.Group();
  const archEmissive = tier === 'high' ? 0.45 : tier === 'low' ? 0.12 : 0.25;
  const archMat = new THREE.MeshStandardMaterial({
    color: couple.palette.accent,
    emissive: couple.palette.accent,
    emissiveIntensity: archEmissive,
    roughness: tier === 'high' ? 0.28 : 0.5,
    metalness: tier === 'high' ? 0.55 : 0.25
  });
  const arch = new THREE.Mesh(new THREE.TorusGeometry(archR, tier === 'high' ? 0.16 : 0.12, 16, 48, Math.PI), archMat);
  archGroup.add(arch);

  // secondary micro-arch at high tier
  if(tier === 'high'){
    const arch2 = new THREE.Mesh(
      new THREE.TorusGeometry(archR * 0.78, 0.07, 12, 40, Math.PI),
      new THREE.MeshStandardMaterial({
        color: 0xC9A267, emissive: 0xC9A267, emissiveIntensity: 0.35, roughness: 0.3, metalness: 0.7
      })
    );
    arch2.position.z = 0.15;
    archGroup.add(arch2);
  }

  const flowerCount = tier === 'high' ? 14 : tier === 'low' ? 5 : 8;
  const flowerMat = new THREE.MeshStandardMaterial({
    color: couple.palette.glow,
    emissive: couple.palette.glow,
    emissiveIntensity: tier === 'high' ? 1.2 : 0.7,
    roughness: 0.5
  });
  for(let i=0; i<flowerCount; i++){
    const t = (i / (flowerCount - 1 || 1)) * Math.PI;
    const fx = archR * Math.cos(t);
    const fy = archR * Math.sin(t);
    const s = new THREE.Mesh(new THREE.SphereGeometry(tier === 'high' ? 0.18 : 0.14, 12, 12), flowerMat);
    s.position.set(fx, fy, (i%2 ? 0.08 : -0.05));
    archGroup.add(s);
  }
  archGroup.position.set(0, 0, -2);
  scene.add(archGroup);

  // chairs
  const chairCount = tier === 'high' ? 32 : tier === 'low' ? 16 : 24;
  const chairMat = new THREE.MeshStandardMaterial({
    color: tier === 'high' ? 0xFFF8EE : 0xE8E2D6,
    roughness: tier === 'high' ? 0.55 : 0.9,
    metalness: tier === 'high' ? 0.15 : 0
  });
  const chairGeo = new THREE.BoxGeometry(
    tier === 'high' ? 0.48 : 0.5,
    tier === 'high' ? 0.62 : 0.5,
    tier === 'high' ? 0.48 : 0.5
  );
  const chairs = new THREE.InstancedMesh(chairGeo, chairMat, chairCount);
  const m = new THREE.Matrix4();
  for(let i=0; i<chairCount; i++){
    const side = i % 2 === 0 ? -1 : 1;
    const row = Math.floor(i/2);
    const x = side * (tier === 'high' ? 3.7 : 4);
    const z = 8 - row * (tier === 'high' ? 1.15 : 1.3);
    m.makeTranslation(x, tier === 'high' ? 0.31 : 0.25, z);
    chairs.setMatrixAt(i, m);
  }
  scene.add(chairs);

  // string lights
  const bulbCount = tier === 'high' ? 22 : tier === 'low' ? 8 : 15;
  const lightGeo = new THREE.SphereGeometry(tier === 'high' ? 0.07 : 0.05, 8, 8);
  const lightMat = new THREE.MeshStandardMaterial({
    color:0xffe0a0, emissive:0xffcf7d,
    emissiveIntensity: tier === 'high' ? 2.0 : tier === 'low' ? 0.9 : 1.4
  });
  const stringLights = new THREE.Group();
  [-1, 1].forEach(side => {
    for(let i=0; i<bulbCount; i++){
      const t = i/(bulbCount-1 || 1);
      const x = side * (4 - 2*t);
      const z = 8 - t*10;
      const y = 3.6 - Math.sin(t*Math.PI)*(tier === 'high' ? 1.25 : 1.0);
      const bulb = new THREE.Mesh(lightGeo, lightMat);
      bulb.position.set(x, y, z);
      stringLights.add(bulb);
    }
  });
  scene.add(stringLights);

  // confetti
  const confettiCount = tier === 'high' ? 280 : tier === 'low' ? 60 : 160;
  const posArr = new Float32Array(confettiCount * 3);
  const velArr = new Float32Array(confettiCount);
  const phaseArr = new Float32Array(confettiCount);
  for(let i=0; i<confettiCount; i++){
    posArr[i*3+0] = (Math.random()-0.5) * 9;
    posArr[i*3+1] = Math.random() * 7 + 1;
    posArr[i*3+2] = -2 + (Math.random()-0.5) * 6;
    velArr[i] = 0.25 + Math.random()*0.4;
    phaseArr[i] = Math.random()*Math.PI*2;
  }
  const confettiGeo = new THREE.BufferGeometry();
  confettiGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  const confettiMat = new THREE.PointsMaterial({
    color: couple.palette.glow, size: tier === 'high' ? 0.11 : 0.08,
    transparent:true, opacity: tier === 'high' ? 0.95 : 0.8,
    blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
  });
  confettiPoints = new THREE.Points(confettiGeo, confettiMat);
  confettiPoints.userData = { vel:velArr, phase:phaseArr };
  scene.add(confettiPoints);

  // aisle petals — high tier only
  petalPoints = null;
  if(tier === 'high'){
    const petalN = 120;
    const pPos = new Float32Array(petalN * 3);
    for(let i=0;i<petalN;i++){
      pPos[i*3+0] = (Math.random()-0.5) * 1.4;
      pPos[i*3+1] = 0.04;
      pPos[i*3+2] = -1.5 + Math.random() * 9;
    }
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    petalPoints = new THREE.Points(pGeo, new THREE.PointsMaterial({
      color: couple.palette.accent, size:0.12, transparent:true, opacity:0.85, depthWrite:false
    }));
    scene.add(petalPoints);
  }

  camera.position.set(CAM_START.x, CAM_START.y, CAM_START.z);
  camera.lookAt(TARGET.x, TARGET.y, TARGET.z);

  const dx = CAM_END.x - TARGET.x, dz = CAM_END.z - TARGET.z;
  orbitRadius = Math.hypot(dx, dz);
  orbitAngle = Math.atan2(dx, dz);
}

function disposeScene(){
  if(!scene) return;
  scene.traverse(obj => {
    if(obj.geometry) obj.geometry.dispose();
    if(obj.material){
      if(Array.isArray(obj.material)) obj.material.forEach(disposeMaterial);
      else disposeMaterial(obj.material);
    }
  });
  scene = null;
  confettiPoints = null;
  petalPoints = null;
  seaMesh = null;
}

function startScene(couple){
  if(!renderer) initThree();
  disposeScene();
  buildWeddingScene(couple);

  $('#scene-names').textContent = couple.names;
  $('#scene-loc').textContent = `${couple.location} · ${couple.date}`;
  const tierLabel = { low:'Intimate setting', mid:'Signature celebration', high:'Grand celebration' };
  $('#scene-tier').textContent = tierLabel[couple.tier] || '';
  const overlay = $('#scene-overlay');
  overlay.classList.remove('show');
  requestAnimationFrame(() => overlay.classList.add('show'));

  sceneActive = true;
  flyStart = performance.now();
  requestAnimationFrame(animateScene);
}

function stopScene(){
  sceneActive = false;
  $('#scene-overlay').classList.remove('show');
}

function animateScene(now){
  if(!sceneActive) return;

  const elapsed = now - flyStart;
  const t = Math.min(1, elapsed / FLY_MS);
  const ease = 1 - Math.pow(1 - t, 3);

  if(t < 1){
    camera.position.set(
      CAM_START.x + (CAM_END.x - CAM_START.x) * ease,
      CAM_START.y + (CAM_END.y - CAM_START.y) * ease,
      CAM_START.z + (CAM_END.z - CAM_START.z) * ease
    );
    camera.lookAt(TARGET.x, TARGET.y, TARGET.z);
  } else {
    orbitAngle += 0.0022;
    camera.position.x = TARGET.x + Math.sin(orbitAngle) * orbitRadius;
    camera.position.z = TARGET.z + Math.cos(orbitAngle) * orbitRadius;
    camera.position.y = CAM_END.y + Math.sin(now * 0.0004) * 0.15;
    camera.lookAt(TARGET.x, TARGET.y, TARGET.z);
  }

  if(confettiPoints){
    const posAttr = confettiPoints.geometry.attributes.position;
    const vel = confettiPoints.userData.vel;
    const phase = confettiPoints.userData.phase;
    for(let i=0; i<vel.length; i++){
      let y = posAttr.array[i*3+1] - vel[i]*0.012;
      if(y < 0.1) y = 6.5 + Math.random()*1.5;
      posAttr.array[i*3+0] += Math.sin(now*0.001 + phase[i]) * 0.003;
      posAttr.array[i*3+1] = y;
    }
    posAttr.needsUpdate = true;
  }

  if(seaMesh){
    const posAttr = seaMesh.geometry.attributes.position;
    const base = seaMesh.userData.basePositions;
    for(let i=0; i<posAttr.count; i++){
      const bx = base[i*3+0], by = base[i*3+1];
      posAttr.array[i*3+2] = Math.sin(bx*0.06 + now*0.0006) * 0.5 + Math.cos(by*0.05 + now*0.0004) * 0.3;
    }
    posAttr.needsUpdate = true;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animateScene);
}
